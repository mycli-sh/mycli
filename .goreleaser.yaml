version: 2

builds:
  - id: cli
    main: ./cli/cmd/my
    binary: my
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: api
    main: ./api/cmd/api
    binary: api
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: cli
    ids:
      - cli
    name_template: "my_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: api
    ids:
      - api
    name_template: "api_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers:
  - id: api-amd64
    ids:
      - api
    goos: linux
    goarch: amd64
    use: buildx
    dockerfile: docker/goreleaser-api.Dockerfile
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}/api:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"

  - id: api-arm64
    ids:
      - api
    goos: linux
    goarch: arm64
    use: buildx
    dockerfile: docker/goreleaser-api.Dockerfile
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}/api:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}/api:{{ .Version }}"
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}/api:{{ .Version }}-amd64"
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}/api:{{ .Version }}-arm64"

  - name_template: "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}/api:latest"
    image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}/api:{{ .Version }}-amd64"
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}/api:{{ .Version }}-arm64"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
